name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Mobile Dependencies
      run: |
        npm install @capacitor/core @capacitor/cli
        npm install @capacitor/android
        npx cap init "Student Note App" "com.studentnoteapp.app" --web-dir=www 

    - name: Set up JDK  21
      uses: actions/setup-java@v4
      with:
        java-version: '21' 
        distribution: 'zulu'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Add Android Platform and Build APK
      run: |
          mkdir www
          cp index.html Style.css script.js www/
          npx cap add android
          echo "configurations.all { resolutionStrategy.force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22' }" >> android/app/build.gradle
          npx cap sync
          sed -i '/dependencies {/a \    implementation(platform("org.jetbrains.kotlin:kotlin-bom:1.8.22"))\n    implementation("org.jetbrains.kotlin:kotlin-stdlib")' android/app/build.gradle
          cd android && ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: student-note-app-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
